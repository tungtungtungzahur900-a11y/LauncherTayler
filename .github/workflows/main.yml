name: Build Tayler-Injector

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      # Мы говорим Гитхабу работать внутри папки Tayler-Injector
      run: gradle assembleDebug
      working-directory: ./Tayler-Injector

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Tayler-Cheat-APK
        path: Tayler-Injector/app/build/outputs/apk/debug/*.apk
