android {
    namespace 'com.tayler.menu' // ВОТ ЭТА СТРОЧКА ВСЁ ИСПРАВИТ
    compileSdk 34

    defaultConfig {
        applicationId "com.tayler.menu"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            ndkBuild {
                abiFilters 'arm64-v8a'
            }
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "src/main/jni/Android.mk"
        }
    }
    
    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}
